name: SGEVCharging
options:
  bundleIdPrefix: com.alfredang
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: GU9WTSTX9M
    CODE_SIGN_STYLE: Automatic
targets:
  SGEVCharging:
    type: application
    platform: iOS
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig
    sources:
      - path: SGEVCharging
    resources:
      - path: SGEVCharging/Resources
    info:
      path: SGEVCharging/Info.plist
      properties:
        CFBundleDisplayName: SG EV Charging
        CFBundleIconName: AppIcon
        CFBundleVersion: "3"
        CFBundleShortVersionString: "1.0"
        ITSAppUsesNonExemptEncryption: false
        LTADataMallAccountKey: $(LTA_DATAMALL_ACCOUNT_KEY)
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: SG EV Charging uses your location to find nearby EV charging points in Singapore.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiredDeviceCapabilities:
          - arm64
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alfredang.sgevcharging
        INFOPLIST_FILE: SGEVCharging/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 3
        TARGETED_DEVICE_FAMILY: "1,2"
